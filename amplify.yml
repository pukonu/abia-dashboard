version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules .next
        - npm ci --include=optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - /root/.npm/**/*
      - .next/cache/**/*
