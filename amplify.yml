version: 1
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules .next
        - corepack enable
        - yarn install --immutable
    build:
      commands:
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .yarn/cache/**/*
      - .next/cache/**/*
